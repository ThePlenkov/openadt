sonar.projectKey=abapify_openadt
sonar.organization=abapify


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=openadt
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8
# SonarQube Cloud automatic analysis (not sonar-project.properties / CI scanner).
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis
#
# While automatic analysis is enabled in SonarCloud Administration > Analysis Method,
# do not add GitHub Actions or other CI-based Sonar scans (they conflict and fail).

sonar.sourceEncoding=UTF-8

sonar.exclusions=**/target/**,**/.devcontainer/**,**/node_modules/**,**/tmp/**,**/.openadt/**,**/.nx/**,**/.husky/**,**/scripts/**,**/tools/devcontainer-bootstrap/**,**/org/eclipse/**
