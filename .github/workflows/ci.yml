# CI: Nx checks + Java tests + OpenGrep SARIF → GitHub Code Scanning.
# Codacy stays on the Codacy cloud app (not in CI).
name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  opengrep:
    name: OpenGrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install OpenGrep and scan
        run: |
          # Pin release binary (install.sh can fail when GitHub version API is unavailable).
          curl -fsSL -o opengrep \
            https://github.com/opengrep/opengrep/releases/download/v1.22.0/opengrep_manylinux_x86
          chmod +x opengrep
          set +e
          ./opengrep scan --config .semgrep.yaml --sarif-output=opengrep.sarif .
          ec=$?
          set -e
          if [ ! -f opengrep.sarif ]; then
            echo "::error::OpenGrep did not produce opengrep.sarif (exit ${ec})"
            exit 1
          fi
          if [ "${ec}" -gt 1 ]; then
            exit "${ec}"
          fi
          # exit 1 = findings only; upload SARIF and do not fail the workflow

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && hashFiles('opengrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: opengrep.sarif
          category: opengrep

  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Connect with `bunx nx connect` and uncomment for Nx Agents + distributed CI.
      # - run: bunx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="test"

      - run: bun install --frozen-lockfile
      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5

      - name: Verify spec sync
        run: bun scripts/verify-spec-sync.ts

      - name: Verify package docs
        run: bun scripts/verify-package-docs.ts

      - run: bunx nx format:check --base=origin/main --head=HEAD
      - run: bunx nx affected -t lint typecheck --base=origin/main --head=HEAD

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          check-latest: true

      - name: Maven verify (distribution, no SAP plugins required)
        run: chmod +x ./mvnw && ./mvnw -q verify -f pom.xml -Pdistribution -Dopenadt.distribution=true

      - name: Java unit tests (optional SAP runtime)
        run: bash scripts/ci-java-test.sh
