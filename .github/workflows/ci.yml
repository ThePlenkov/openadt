# CI: Nx checks + Java tests + Codacy SARIF → GitHub Code Scanning (no Codacy upload).
name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  codacy:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@v4.4.7
        with:
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
          force-file-permissions: true
          fail-if-incomplete: false

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Connect with `bunx nx connect` and uncomment for Nx Agents + distributed CI.
      # - run: bunx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="test"

      - run: bun install --frozen-lockfile
      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5

      - run: bunx nx format:check
      - run: bunx nx affected -t lint typecheck

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          check-latest: true

      - name: Java unit tests (optional SAP runtime)
        run: bash scripts/ci-java-test.sh

      - run: bunx nx fix-ci
        if: always()
