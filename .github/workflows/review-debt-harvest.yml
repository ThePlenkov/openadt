# Harvest unresolved review threads from merged PRs into .agents/review-debt/debt.jsonl
# Does NOT run on every push or every /act — only on merge or manual dispatch.
name: Review debt harvest

on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      pr_number:
        description: Merged PR number to harvest
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  harvest:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Harvest unresolved threads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          SHA="${{ github.event.pull_request.merge_commit_sha || github.sha }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          bun scripts/act/harvest-threads.ts "$OWNER" "$REPO" "$PR" \
            --merged-sha "$SHA" \
            --run-id "${{ github.run_id }}"

      - name: Commit ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agents/review-debt/
          if git diff --staged --quiet; then
            echo "No new review debt to commit"
            exit 0
          fi
          PR="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          git commit -m "chore(review-debt): harvest unresolved threads from PR #${PR}"
          git push
