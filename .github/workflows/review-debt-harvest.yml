# Harvest unresolved review threads into .agents/review-debt/harvests/*.jsonl
# Does NOT run on every push or every /act — only on merge, after PR CI, or manual dispatch.
# New harvest files land on main as append-only paths (unique per run — no ledger conflicts).
# Scripts now live under .agents/skills/harvest/ (see /harvest SKILL.md).
name: Review debt harvest

on:
  pull_request:
    types: [closed]

  # Catch bot review threads posted late in PR CI when merge happens before CI finishes.
  workflow_run:
    workflows: ["CI"]
    types: [completed]

  workflow_dispatch:
    inputs:
      pr_numbers:
        description: Comma-separated merged PR numbers (e.g. 72,67)
        required: false
        type: string
      merged_since:
        description: Include PRs merged on/after (YYYY-MM-DD, UTC)
        required: false
        type: string
      merged_until:
        description: Include PRs merged on/before (YYYY-MM-DD, UTC)
        required: false
        type: string
      last_n:
        description: After other filters, keep only the N most recently merged PRs (0 = no limit)
        required: false
        default: "0"
        type: string
      pr_author:
        description: PR author login (who opened the PR)
        required: false
        type: string
      labels:
        description: Comma-separated PR labels (all must match)
        required: false
        type: string
      thread_author:
        description: Review comment author filter (substring match, e.g. codeant-ai)
        required: false
        type: string
      list_only:
        description: Only list matching PR numbers (no harvest)
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write
  pull-requests: read

concurrency:
  group: review-debt-land-main
  cancel-in-progress: false

jobs:
  harvest:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion != 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Resolve harvest target (merge or post-PR-CI)
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_run'
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun .agents/skills/harvest/scripts/resolve-harvest-target.ts

      - name: Harvest unresolved threads (single PR)
        if: |
          (github.event_name == 'pull_request' || github.event_name == 'workflow_run') &&
          steps.target.outputs.should_harvest == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun .agents/skills/harvest/scripts/harvest-threads.ts \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            "${{ steps.target.outputs.pr_number }}" \
            --merged-sha "${{ steps.target.outputs.merge_sha }}" \
            --run-id "${{ github.run_id }}"

      - name: Harvest unresolved threads (batch dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          RUN_ID="${{ github.run_id }}"

          ARGS=()
          [ -n "${{ github.event.inputs.pr_numbers }}" ] && \
            ARGS+=(--pr-ids "${{ github.event.inputs.pr_numbers }}")
          [ -n "${{ github.event.inputs.merged_since }}" ] && \
            ARGS+=(--merged-since "${{ github.event.inputs.merged_since }}")
          [ -n "${{ github.event.inputs.merged_until }}" ] && \
            ARGS+=(--merged-until "${{ github.event.inputs.merged_until }}")
          [ "${{ github.event.inputs.last_n }}" != "0" ] && \
            ARGS+=(--last "${{ github.event.inputs.last_n }}")
          [ -n "${{ github.event.inputs.pr_author }}" ] && \
            ARGS+=(--pr-author "${{ github.event.inputs.pr_author }}")
          [ -n "${{ github.event.inputs.labels }}" ] && \
            ARGS+=(--labels "${{ github.event.inputs.labels }}")
          [ -n "${{ github.event.inputs.thread_author }}" ] && \
            ARGS+=(--thread-author "${{ github.event.inputs.thread_author }}")
          [ "${{ github.event.inputs.list_only }}" = "true" ] && \
            ARGS+=(--list-only)

          bun .agents/skills/harvest/scripts/harvest-debt-batch.ts "$OWNER" "$REPO" \
            "${ARGS[@]}" \
            --run-id "$RUN_ID"

      - name: Land harvest files on main
        if: |
          ((github.event_name == 'pull_request' || github.event_name == 'workflow_run') &&
          steps.target.outputs.should_harvest == 'true') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.list_only != 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TITLE="chore(review-debt): harvest PR #${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            TITLE="chore(review-debt): harvest PR #${{ steps.target.outputs.pr_number }} (after PR CI)"
          else
            TITLE="chore(review-debt): harvest batch (run ${{ github.run_id }})"
          fi
          bash .agents/skills/harvest/scripts/land-harvest-files.sh "$TITLE"
