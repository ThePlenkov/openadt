# CodeScene CLI delta — manual trigger only.
# Uses codescene/codescene-mcp Docker image (embedded cs CLI; no downloads.codescene.io at runtime).
# Complements the CodeScene GitHub App (suppress links, quality-gate profile in codescene.io).
#
# Why manual: CS_ACCESS_TOKEN is an org secret that is not reliably exposed to bots/
# PRs gated by branch protection rules. Triggering manually guarantees the actor has
# permission to use the secret. Also avoids flaky 403s from downloads.codescene.io
# that occur on cold runners.
#
# Secret: CS_ACCESS_TOKEN — abapify org secret (same as refactoring-agent.yml)
# PAT: https://codescene.io/users/me/pat
name: CodeScene delta

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref to compare against (e.g. origin/main, main, develop)"
        required: true
        default: "origin/main"
      head_ref:
        description: "Head ref to analyse (default: HEAD)"
        required: false
        default: "HEAD"

permissions:
  contents: read

jobs:
  delta:
    name: CodeScene delta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require CS_ACCESS_TOKEN
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        run: |
          if [ -z "${CS_ACCESS_TOKEN}" ]; then
            echo "::error title=CodeScene CI not configured::CS_ACCESS_TOKEN org secret missing or not granted to this repo. Set under abapify → Settings → Secrets and variables → Actions (PAT from https://codescene.io/users/me/pat)."
            exit 1
          fi

      - name: Delta analysis
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        run: bash scripts/ci-codescene-delta.sh "${{ inputs.base_ref }}" "${{ inputs.head_ref }}"
