name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Semantic version bump (from latest v* tag, or pom baseline)
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - prerelease
          - prepatch
          - preminor
          - premajor
      prerelease_id:
        description: Pre-release id — only used with prerelease/prepatch/preminor/premajor bumps
        required: false
        type: choice
        default: ""
        options:
          - ""
          - alpha
          - beta
          - rc
      draft:
        description: Create as draft release — assets are attached but release stays hidden until published
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - name: Compute next version and update repo files
        id: bump
        run: |
          bun tools/release-version/src/main.ts \
            --bump="${{ inputs.version_bump }}" \
            --prerelease-id="${{ inputs.prerelease_id }}"

      - name: Commit version bump and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Formula/ is intentionally NOT staged here: the bump step writes a
          # PLACEHOLDER sha256, which would publish a broken tap formula to
          # `main` before the build job computes the real checksum.
          git add pom.xml apps/*/pom.xml packaging/
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 1
          fi
          git commit -m "chore(release): prepare ${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build:
    name: Build ${{ matrix.platform }} distribution
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            ext: zip
          - os: ubuntu-latest
            platform: linux-x64
            ext: tar.gz
          - os: macos-latest
            platform: darwin-arm64
            ext: tar.gz
          - os: macos-15-intel
            platform: darwin-x64
            ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.bump.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - uses: actions/setup-dotnet@v5
        if: matrix.os == 'windows-latest'
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-java@v5
        if: matrix.os == 'windows-latest'
        with:
          distribution: temurin
          java-version: "21"

      - name: Build distribution jar
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          chmod +x ./mvnw
          ./mvnw -q -f pom.xml -pl apps/openadt-cli -am -Pdistribution -Dopenadt.distribution=true package -Dmaven.test.skip=true

      - name: Build openadt-mcp workspace dependencies
        shell: bash
        run: bunx nx run adt-mcp:build

      - name: Package openadt.zip and compute checksum
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          OPENADT_PACKAGE_WIN_EXE: "1"
        run: bun run package:release -- --version=${{ needs.bump.outputs.version }}

      - name: Build openadt-mcp binary
        if: matrix.os != 'windows-latest'
        shell: bash
        run: bun scripts/package-mcp-only.ts --version=${{ needs.bump.outputs.version }} --platform=${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.bump.outputs.version }}-${{ matrix.platform }}
          path: |
            packaging/dist/openadt-${{ needs.bump.outputs.version }}.zip
            packaging/dist/openadt-${{ needs.bump.outputs.version }}.zip.sha256
            packaging/dist/openadt-mcp-${{ needs.bump.outputs.version }}-${{ matrix.platform }}.${{ matrix.ext }}
            packaging/dist/openadt-mcp-${{ needs.bump.outputs.version }}-${{ matrix.platform }}.${{ matrix.ext }}.sha256
          retention-days: 1
          if-no-files-found: warn

  create:
    name: Create ${{ inputs.draft == true && 'draft ' || '' }}release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-${{ needs.bump.outputs.version }}-*
          path: dist
          merge-multiple: true

      - name: Create release with assets
        # Assets attached at creation time — required for immutable releases (no post-upload possible).
        run: |
          version="${{ needs.bump.outputs.version }}"
          assets=( "dist/openadt-${version}.zip" "dist/openadt-${version}.zip.sha256" )
          for platform in win-x64 linux-x64 darwin-arm64 darwin-x64; do
            if [[ "${platform}" == "win-x64" ]]; then
              ext="zip"
            else
              ext="tar.gz"
            fi
            f="dist/openadt-mcp-${version}-${platform}.${ext}"
            if [[ -f "${f}" ]]; then
              assets+=( "${f}" "${f}.sha256" )
            fi
          done
          gh release create "${{ needs.bump.outputs.tag }}" \
            --repo abapify/openadt \
            --title "Release ${{ needs.bump.outputs.tag }}" \
            --generate-notes \
            ${{ inputs.draft == true && '--draft' || '' }} \
            "${assets[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync:
    name: Sync Scoop and Homebrew
    needs: [bump, build, create]
    if: ${{ inputs.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-${{ needs.bump.outputs.version }}-*
          path: dist
          merge-multiple: true

      - name: Patch packaging manifests with real checksums
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.bump.outputs.tag }}"
          version="${{ needs.bump.outputs.version }}"

          # openadt (jar) — only on windows-latest artifact.
          openadt_sha=""
          for path in dist/openadt-${version}.zip.sha256 dist-win-x64/openadt-${version}.zip.sha256; do
            if [[ -f "${path}" ]]; then
              openadt_sha="$(awk '{print tolower($1)}' "${path}")"
              break
            fi
          done
          if [[ -n "${openadt_sha}" ]]; then
            echo "Patching openadt manifests with SHA256: ${openadt_sha}"
            url="https://github.com/abapify/openadt/releases/download/${tag}/openadt-${version}.zip"
            jq --arg sha "${openadt_sha}" \
               --arg ver "${version}" \
               --arg url "${url}" \
               '.version = $ver | .architecture["64bit"].url = $url | .architecture["64bit"].hash = $sha' \
               packaging/scoop/openadt.json > /tmp/openadt.json
            mv /tmp/openadt.json packaging/scoop/openadt.json
            sed -i "s/sha256 \"[^\"]*\"/sha256 \"${openadt_sha}\"/" packaging/homebrew/openadt.rb
            cp packaging/homebrew/openadt.rb Formula/openadt.rb
          else
            echo "No openadt jar sha256 found, skipping openadt manifests." >&2
          fi

          # openadt-mcp — Scoop is Windows-only, so only patch the Scoop
          # manifest on the win-x64 shard. The Homebrew formula is
          # darwin-arm64-only in v1 (see packaging/homebrew/openadt-mcp.rb);
          # only patch it on the darwin-arm64 shard.
          for platform in win-x64 linux-x64 darwin-arm64 darwin-x64; do
            if [[ "${platform}" == "win-x64" ]]; then
              ext="zip"
            else
              ext="tar.gz"
            fi
            sha_file="dist/openadt-mcp-${version}-${platform}.${ext}.sha256"
            if [[ ! -f "${sha_file}" ]]; then
              echo "No sha256 for ${platform}, skipping." >&2
              continue
            fi
            sha="$(awk '{print tolower($1)}' "${sha_file}")"
            url="https://github.com/abapify/openadt/releases/download/${tag}/openadt-mcp-${version}-${platform}.${ext}"

            if [[ "${platform}" == "win-x64" ]]; then
              extract_dir="openadt-mcp-${version}-${platform}"
              echo "Patching openadt-mcp Scoop manifest (${platform}) with SHA256: ${sha}"
              jq --arg sha "${sha}" \
                 --arg ver "${version}" \
                 --arg url "${url}" \
                 --arg dir "${extract_dir}" \
                 '.version = $ver | .extract_dir = $dir | .architecture["64bit"].url = $url | .architecture["64bit"].hash = $sha' \
                 packaging/scoop/openadt-mcp.json > /tmp/openadt-mcp.json
              mv /tmp/openadt-mcp.json packaging/scoop/openadt-mcp.json
            elif [[ "${platform}" == "darwin-arm64" ]]; then
              echo "Patching openadt-mcp Homebrew formula (${platform}) with SHA256: ${sha}"
              sed -i "s/sha256 \"[^\"]*\"/sha256 \"${sha}\"/" packaging/homebrew/openadt-mcp.rb
              cp packaging/homebrew/openadt-mcp.rb Formula/openadt-mcp.rb
            else
              echo "openadt-mcp ${platform}: archive produced but not wired into a manifest in v1." >&2
            fi
          done

          echo "--- Patched packaging/scoop/openadt.json ---"
          cat packaging/scoop/openadt.json
          echo "--- Patched packaging/scoop/openadt-mcp.json ---"
          cat packaging/scoop/openadt-mcp.json
          echo "--- Patched Formula/openadt-mcp.rb ---"
          cat Formula/openadt-mcp.rb

      - name: Create packaging sync token (GitHub App)
        id: packaging-sync-token
        env:
          ABAPIFY_BRO_APP_PRIVATE_KEY: ${{ secrets.ABAPIFY_BRO_APP_PRIVATE_KEY }}
        if: vars.ABAPIFY_BRO_APP_CLIENT_ID != '' && env.ABAPIFY_BRO_APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ABAPIFY_BRO_APP_CLIENT_ID }}
          private-key: ${{ secrets.ABAPIFY_BRO_APP_PRIVATE_KEY }}
          owner: abapify
          repositories: scoop-bucket,homebrew-openadt

      - name: Sync Scoop bucket
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ steps.packaging-sync-token.outputs.token }}
          OPENADT_SCOOP_BUCKET_TOKEN: ${{ steps.packaging-sync-token.outputs.token || secrets.OPENADT_SCOOP_BUCKET_TOKEN }}
        run: |
          echo "--- openadt.json at sync time ---"
          cat packaging/scoop/openadt.json
          echo "--- openadt-mcp.json at sync time ---"
          cat packaging/scoop/openadt-mcp.json
          bash tools/sync-scoop-bucket/sync.sh openadt openadt-mcp

      - name: Sync Homebrew tap formula
        shell: bash
        env:
          GH_TOKEN: ${{ steps.packaging-sync-token.outputs.token }}
          OPENADT_HOMEBREW_TAP_TOKEN: ${{ steps.packaging-sync-token.outputs.token || secrets.OPENADT_HOMEBREW_TAP_TOKEN }}
        run: bash tools/sync-homebrew-tap/sync.sh openadt openadt-mcp

      - name: Trigger abapify/homebrew-openadt mirror
        shell: bash
        env:
          GH_TOKEN: ${{ steps.packaging-sync-token.outputs.token || secrets.OPENADT_HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "Skipping homebrew-openadt dispatch (configure ABAPIFY_BRO app or OPENADT_HOMEBREW_TAP_TOKEN)."
            exit 0
          fi
          gh api repos/abapify/homebrew-openadt/dispatches \
            -f event_type=openadt-release \
            -f "client_payload[version]=${{ needs.bump.outputs.version }}"
