name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Semantic version bump (from latest v* tag, or pom baseline)
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - prerelease
          - prepatch
          - preminor
          - premajor
      prerelease_id:
        description: Pre-release id (rc, beta, alpha) — only for prerelease/prepatch/preminor/premajor bumps
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version, tag, and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - name: Compute next version and update repo files
        id: bump
        run: |
          bun tools/release-version/src/main.ts \
            --bump="${{ inputs.version_bump }}" \
            --prerelease-id="${{ inputs.prerelease_id }}"

      - name: Commit version bump and create release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Formula/ is intentionally NOT staged here: the bump step writes a
          # PLACEHOLDER sha256, which would publish a broken tap formula to
          # `main` before the publish workflow computes the real checksum.
          git add pom.xml apps/*/pom.xml packaging/
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 1
          fi
          git commit -m "chore(release): prepare ${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
