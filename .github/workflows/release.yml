name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Semantic version bump (from latest v* tag, or pom baseline)
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - prerelease
          - prepatch
          - preminor
          - premajor
      prerelease_id:
        description: Pre-release id (rc, beta, alpha) — only for prerelease/prepatch/preminor/premajor bumps
        required: false
        type: string
      draft:
        description: Create as draft release — publish manually to trigger the Publish workflow
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - name: Compute next version and update repo files
        id: bump
        run: |
          bun tools/release-version/src/main.ts \
            --bump="${{ inputs.version_bump }}" \
            --prerelease-id="${{ inputs.prerelease_id }}"

      - name: Commit version bump and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Formula/ is intentionally NOT staged here: the bump step writes a
          # PLACEHOLDER sha256, which would publish a broken tap formula to
          # `main` before the build job computes the real checksum.
          git add pom.xml apps/*/pom.xml packaging/
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 1
          fi
          git commit -m "chore(release): prepare ${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build:
    name: Build distribution artifacts
    needs: bump
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.bump.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build distribution jar
        shell: bash
        run: |
          chmod +x ./mvnw
          ./mvnw -q -f pom.xml -pl apps/openadt-cli -am -Pdistribution -Dopenadt.distribution=true package -Dmaven.test.skip=true

      - name: Package zip and compute checksums
        shell: bash
        env:
          OPENADT_PACKAGE_WIN_EXE: "1"
        run: bun run package:release -- --version=${{ needs.bump.outputs.version }}

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.bump.outputs.version }}
          path: |
            packaging/dist/openadt-${{ needs.bump.outputs.version }}.zip
            packaging/dist/openadt-${{ needs.bump.outputs.version }}.zip.sha256
            packaging/scoop/openadt.json
            Formula/openadt.rb
          retention-days: 1

  create:
    name: Create ${{ inputs.draft == true && 'draft ' || '' }}release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.bump.outputs.version }}
          path: dist

      - name: Create GitHub App token (so release event triggers Publish workflow)
        id: app-token
        env:
          ABAPIFY_BRO_APP_PRIVATE_KEY: ${{ secrets.ABAPIFY_BRO_APP_PRIVATE_KEY }}
        if: vars.ABAPIFY_BRO_APP_CLIENT_ID != '' && env.ABAPIFY_BRO_APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ABAPIFY_BRO_APP_CLIENT_ID }}
          private-key: ${{ secrets.ABAPIFY_BRO_APP_PRIVATE_KEY }}
          owner: abapify
          repositories: openadt

      - name: Create release with assets
        run: |
          gh release create "${{ needs.bump.outputs.tag }}" \
            --repo abapify/openadt \
            --title "Release ${{ needs.bump.outputs.tag }}" \
            --generate-notes \
            ${{ inputs.draft == true && '--draft' || '' }} \
            "dist/packaging/dist/openadt-${{ needs.bump.outputs.version }}.zip" \
            "dist/packaging/dist/openadt-${{ needs.bump.outputs.version }}.zip.sha256"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
