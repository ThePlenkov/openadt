name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync packaging for ${{ github.event.release.tag_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - name: Download release assets (for updated scoop/formula files)
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          gh release download "${tag}" \
            --repo abapify/openadt \
            --pattern "openadt-${version}.zip.sha256" \
            --dir /tmp/release-assets
          sha256="$(awk '{print $1}' /tmp/release-assets/openadt-${version}.zip.sha256 | tr '[:upper:]' '[:lower:]')"
          # Patch scoop manifest and formula with real checksum
          jq --arg sha "${sha256}" \
             --arg ver "${version}" \
             --arg url "https://github.com/abapify/openadt/releases/download/${tag}/openadt-${version}.zip" \
             '.version = $ver | .architecture["64bit"].url = $url | .architecture["64bit"].hash = $sha' \
             packaging/scoop/openadt.json > /tmp/openadt.json
          mv /tmp/openadt.json packaging/scoop/openadt.json
          sed -i "s/sha256 \"[^\"]*\"/sha256 \"${sha256}\"/" Formula/openadt.rb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create packaging sync token (GitHub App)
        id: packaging-sync-token
        env:
          ABAPIFY_BRO_APP_PRIVATE_KEY: ${{ secrets.ABAPIFY_BRO_APP_PRIVATE_KEY }}
        if: vars.ABAPIFY_BRO_APP_CLIENT_ID != '' && env.ABAPIFY_BRO_APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ABAPIFY_BRO_APP_CLIENT_ID }}
          private-key: ${{ secrets.ABAPIFY_BRO_APP_PRIVATE_KEY }}
          owner: abapify
          repositories: scoop-bucket,homebrew-openadt

      - name: Sync scoop bucket
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ steps.packaging-sync-token.outputs.token }}
          OPENADT_SCOOP_BUCKET_TOKEN: ${{ steps.packaging-sync-token.outputs.token || secrets.OPENADT_SCOOP_BUCKET_TOKEN }}
        run: bash tools/sync-scoop-bucket/sync.sh

      - name: Trigger abapify/scoop-bucket mirror
        shell: bash
        env:
          GH_TOKEN: ${{ steps.packaging-sync-token.outputs.token || secrets.OPENADT_SCOOP_BUCKET_TOKEN }}
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_VERSION#v}"
          if [ -z "${GH_TOKEN}" ]; then
            echo "Skipping scoop-bucket dispatch (configure ABAPIFY_BRO app or OPENADT_SCOOP_BUCKET_TOKEN)."
            exit 0
          fi
          gh api repos/abapify/scoop-bucket/dispatches \
            -f event_type=openadt-release \
            -f "client_payload[version]=${version}"

      - name: Sync Homebrew tap formula
        shell: bash
        env:
          GH_TOKEN: ${{ steps.packaging-sync-token.outputs.token }}
          OPENADT_HOMEBREW_TAP_TOKEN: ${{ steps.packaging-sync-token.outputs.token || secrets.OPENADT_HOMEBREW_TAP_TOKEN }}
        run: bash tools/sync-homebrew-tap/sync.sh

      - name: Trigger abapify/homebrew-openadt mirror
        shell: bash
        env:
          GH_TOKEN: ${{ steps.packaging-sync-token.outputs.token || secrets.OPENADT_HOMEBREW_TAP_TOKEN }}
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_VERSION#v}"
          if [ -z "${GH_TOKEN}" ]; then
            echo "Skipping homebrew-openadt dispatch (configure ABAPIFY_BRO app or OPENADT_HOMEBREW_TAP_TOKEN)."
            exit 0
          fi
          gh api repos/abapify/homebrew-openadt/dispatches \
            -f event_type=openadt-release \
            -f "client_payload[version]=${version}"
