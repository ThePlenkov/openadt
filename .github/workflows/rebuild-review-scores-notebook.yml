name: Rebuild Review Scores Notebook

on:
  push:
    branches:
      - main
    paths:
      - '.act/data/review_scores.csv'
      - '.act/.review_scores_analysis.ipynb'
      - 'scripts/rebuild-review-scores-notebook.py'

permissions:
  contents: write

jobs:
  rebuild-notebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jupyter nbconvert pandas matplotlib seaborn numpy

      - name: Rebuild notebook
        run: python scripts/rebuild-review-scores-notebook.py

      - name: Commit updated notebook
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .act/.review_scores_analysis.ipynb
          git diff --staged --quiet || git commit -m "Auto-update review scores analysis notebook"
          git push
